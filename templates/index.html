<!DOCTYPE html>
<html>
<head>
    <title>Phishing Email Detection</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 50px;
        }

        textarea{
            width: 500px;
            height: 200px;
            padding: 10px;
            font-size: 16px;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        h2{
            margin-top: 20px;
        }
    </style>

</head>
<body>

    <h1>Phishing Email Detection System</h1>

    <form method="POST">

        <textarea
        name="email"
        placeholder="Paste Email Content Here"></textarea>

        <br><br>

        <button type="submit">
            Check Email
        </button>

    </form>

    <h2>{{ result }}</h2>

</body>
</html>
